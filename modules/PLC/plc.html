<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
PLC Operations
</title>


<script src="https://cdn.tailwindcss.com"></script>


<link rel="stylesheet" href="../../components/style.css">


</head>



<body>



<div id="sidebar-container"></div>





<header>


<div class="
flex
items-center
gap-4
">


<button

id="menu-open"

class="
w-12
h-12
rounded-xl
bg-cyan-400/20
text-cyan-300
flex
items-center
justify-center
hover:scale-110
transition
">


<svg

width="26"

height="26"

viewBox="0 0 24 24"

fill="none"

stroke="currentColor"

stroke-width="2"

stroke-linecap="round"

stroke-linejoin="round"

>


<path d="M4 6h16"/>

<path d="M4 12h16"/>

<path d="M4 18h16"/>


</svg>


</button>





<div>


<h1 class="
text-xl
font-bold
">

PLC Operations

</h1>



<p class="
text-sm
text-slate-300
">

PLC Work Management

</p>



</div>


</div>


</header>







<main class="
max-w-7xl
mx-auto
p-6
space-y-8
">





<section>


<div class="
flex
justify-between
items-center
mb-6
">



<div>


<h2 class="
text-3xl
font-bold
">

PLC Work Log

</h2>



<p class="
text-slate-300
mt-2
">

บันทึกงานแก้ไข PLC และปัญหาเครื่องจักร

</p>



</div>





<button

id="add-btn"

class="
dashboard-btn
bg-cyan-500/80
text-white
px-5
py-3
">

+ Add Work

</button>



</div>







<input

id="search-input"

placeholder="Search PLC Work..."

class="
w-full
p-4
rounded-xl
mb-6
"

>







<div

id="plc-list"

class="
grid
grid-cols-1
md:grid-cols-2
xl:grid-cols-3
gap-6
">


</div>





</section>






</main>









<div

id="modal"

class="
hidden
fixed
inset-0
z-50
bg-black/50
backdrop-blur
flex
items-center
justify-center
">






<div

class="
ops-card
w-full
max-w-lg
">





<h2

class="
text-xl
font-bold
mb-5
">

PLC Work Detail

</h2>








<input

id="title"

placeholder="PLC Work Title"

class="
w-full
mb-4
"

>








<textarea

id="detail"

placeholder="Problem Detail"

class="
w-full
h-24
mb-4
"

></textarea>








<textarea

id="solution"

placeholder="Solution"

class="
w-full
h-24
mb-4
"

></textarea>








<select

id="status"

class="
w-full
mb-5
">


<option value="Open">

Open

</option>


<option value="Process">

Process

</option>


<option value="Complete">

Complete

</option>


</select>









<div

class="
flex
justify-end
gap-3
">





<button

id="cancel-btn"

class="
bg-slate-600
text-white
px-4
py-2
rounded-xl
">

Cancel

</button>







<button

id="save-btn"

class="
bg-cyan-500
text-white
px-4
py-2
rounded-xl
">

Save

</button>





</div>







</div>




</div>









<script src="../../components/common.js"></script>

<script src="../../components/sidebar.js"></script>

<script src="./plc.js"></script>



</body>

</html>
