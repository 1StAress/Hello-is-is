<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
PLC Detail
</title>


<script src="https://cdn.tailwindcss.com"></script>


<link rel="stylesheet" href="../../components/style.css">


</head>



<body>



<div id="sidebar-container"></div>





<header>


<div class="
flex
items-center
gap-4
">



<button

id="menu-open"

class="
w-12
h-12
rounded-xl
bg-cyan-400/20
text-cyan-300
flex
items-center
justify-center
hover:scale-110
transition
">


<svg

width="26"

height="26"

viewBox="0 0 24 24"

fill="none"

stroke="currentColor"

stroke-width="2"

stroke-linecap="round"

stroke-linejoin="round"

>


<path d="M4 6h16"/>

<path d="M4 12h16"/>

<path d="M4 18h16"/>


</svg>


</button>





<div>


<h1 class="
text-xl
font-bold
">

PLC Detail

</h1>


<p class="
text-sm
text-slate-300
">

PLC Work Information

</p>


</div>



</div>



</header>








<main class="
max-w-7xl
mx-auto
p-6
">





<section class="ops-card">





<div class="
flex
justify-between
items-center
mb-8
">



<h2

id="work-title"

class="
text-3xl
font-bold
">

โปรดใส่ข้อมูล

</h2>





<div class="
text-slate-400
">

ID:

<span id="work-id">

-

</span>


</div>




</div>








<label class="font-bold">

Title

</label>



<input

id="title"

placeholder="โปรดใส่ข้อมูล"

class="
w-full
mb-5
"

>








<label class="font-bold">

Problem Detail

</label>



<textarea

id="detail"

placeholder="โปรดใส่ข้อมูล"

class="
w-full
h-32
mb-5
"

></textarea>









<label class="font-bold">

Solution

</label>



<textarea

id="solution"

placeholder="โปรดใส่ข้อมูล"

class="
w-full
h-32
mb-5
"

></textarea>









<label class="font-bold">

Status

</label>



<select

id="status"

class="
w-full
mb-8
"


>


<option value="Open">

Open

</option>


<option value="Process">

Process

</option>


<option value="Complete">

Complete

</option>


</select>









<h3 class="
text-2xl
font-bold
mb-4
">

Pictures

</h3>








<input

id="image-input"

type="file"

accept="image/*"

multiple

class="
mb-6
"

>








<div

id="image-list"

class="
grid
grid-cols-2
md:grid-cols-4
gap-5
mb-8
">


</div>









<div class="
flex
justify-between
">





<button

id="back-btn"

class="
dashboard-btn
bg-slate-600
text-white
">

Back

</button>








<button

id="save-btn"

class="
dashboard-btn
bg-cyan-500
text-white
">

Save

</button>






</div>







</section>






</main>









<script src="../../components/common.js"></script>

<script src="../../components/sidebar.js"></script>

<script src="./plc_detail.js"></script>



</body>


</html>
